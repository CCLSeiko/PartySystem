# ============================================================
# DonationSystem — Production Docker Compose
# Services: Nginx + Frontend (static build) + FastAPI + PostgreSQL
# ============================================================
services:

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-donationsystem}
      POSTGRES_USER: ${POSTGRES_USER:-donation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donation} -d ${POSTGRES_DB:-donationsystem}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  # ── MailHog (dev SMTP) ──
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI
    profiles:
      - dev

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-donation}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-donationsystem}
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-donation}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-donationsystem}"
      DATABASE_URL_SYNC: "postgresql://${POSTGRES_USER:-donation}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-donationsystem}"
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@donationsystem.dev}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  # ── Frontend Build (one-shot) ──
  frontend-build:
    build:
      context: ./frontend
    platform: linux/amd64
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
    volumes:
      - frontend_out:/shared
    command: cp -r /app/out/. /shared/

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_out:/usr/share/nginx/html:ro
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      backend:
        condition: service_started

volumes:
  pgdata:
  frontend_out:
